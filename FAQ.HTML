<!DOCTYPE html>
<html lang="ko">
<head>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', -apple-system, sans-serif;
  background: #fff;
  color: #111827;
}

/* ===== NAV ===== */
@media (min-width: 769px) {
  :root { --blue:#2563EB; --nav-h:160px; --sub-h:50px; --nav-total:210px; }
  .nav-top {
    position:fixed; top:0; left:0; right:0; z-index:1000;
    height:var(--nav-h); background:rgba(255,255,255,0.97);
    backdrop-filter:blur(12px);
    display:flex; align-items:center; justify-content:space-between;
    padding:0 68px; border-bottom:1px solid rgba(0,0,0,0.06);
  }
  .nav-logo img { height:144px; width:auto; }
  .nav-vivid { position:absolute; left:50%; transform:translateX(-50%); text-decoration:none; }
  .nav-vivid img { height:136px; width:auto; object-fit:contain; }
  .nav-btns { display:flex; align-items:center; gap:12px; }
  .btn-kakao {
    display:flex; align-items:center; justify-content:center; gap:8px;
    background:#fff; color:#111; border:1.5px solid #E5E7EB;
    width:168px; height:50px; border-radius:50px;
    font-size:14px; font-weight:600; cursor:pointer; white-space:nowrap;
  }
  .btn-consult {
    display:flex; align-items:center; justify-content:center; gap:8px;
    background:#2563EB; color:#fff; border:none;
    width:142px; height:50px; border-radius:50px;
    font-size:14px; font-weight:700; cursor:pointer; white-space:nowrap;
  }
  .nav-hamburger { display:none; }
  .nav-sub {
    position:fixed; top:var(--nav-h); left:0; right:0; z-index:999;
    height:var(--sub-h); background:#fff;
    border-bottom:1px solid rgba(0,0,0,0.06);
    display:flex; align-items:center; justify-content:center;
  }
  .nav-sub a { font-size:17px; font-weight:600; color:#111827; text-decoration:none; padding:0 32px; }
  .nav-sub a:hover { color:#2563EB; }
  .nav-sub a.active { color:#2563EB; }
  .nav-sub-div { width:1px; height:13px; background:#9CA3AF; }
  .mobile-drawer { display:none !important; }
}

/* ===== HERO ===== */
.faq-hero {
  margin-top:var(--nav-total, 210px);
  background:#fff;
  border-bottom:1px solid #E5E7EB;
}
.faq-hero-inner {
  max-width:1100px; margin:0 auto;
  padding:52px 80px 44px;
  display:flex; align-items:center; justify-content:space-between;
  gap:40px;
}
.faq-hero-left { flex:1; }
.faq-hero-title {
  font-size:38px; font-weight:900; line-height:1.3;
  color:#111827; margin-bottom:12px; letter-spacing:-0.5px;
}
.faq-hero-title span { color:#2563EB; }
.faq-hero-desc {
  font-size:14px; color:#6B7280; line-height:1.7; margin-bottom:24px;
}
.faq-search-wrap {
  display:flex; align-items:center;
  border:1.5px solid #E5E7EB; border-radius:10px;
  padding:0 16px; gap:10px; height:48px;
  max-width:440px; transition:border-color .2s;
  background:#fff;
}
.faq-search-wrap:focus-within { border-color:#2563EB; }
.faq-search-wrap input { flex:1; border:none; background:transparent; font-size:14px; color:#111827; outline:none; }
.faq-search-wrap input::placeholder { color:#9CA3AF; }
.faq-search-icon { color:#9CA3AF; flex-shrink:0; }
.faq-hero-img { flex-shrink:0; }
.faq-hero-img svg { display:block; }

/* ===== CATEGORY TABS ===== */
.faq-tabs-wrap {
  background:#fff; border-bottom:1px solid #E5E7EB;
  overflow-x:auto; scrollbar-width:none;
}
.faq-tabs-wrap::-webkit-scrollbar { display:none; }
.faq-tabs-outer {
  max-width:1100px; margin:0 auto;
  padding:0 80px;
  display:flex; justify-content:center;
}
.faq-tabs { display:flex; gap:0; flex:1; justify-content:space-between; }
.faq-tab {
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
  padding:20px 0 16px; min-width:104px;
  border:none; background:transparent; cursor:pointer;
  font-size:13px; font-weight:600; color:#6B7280;
  border-bottom:2.5px solid transparent;
  transition:all .2s; text-align:center;
}
.faq-tab:hover { color:#2563EB; }
.faq-tab.active { color:#2563EB; border-bottom-color:#2563EB; }
.faq-tab-icon {
  width:46px; height:46px; border-radius:12px;
  background:#F3F4F6;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:background .2s;
}
.faq-tab.active .faq-tab-icon { background:#EEF2FF; }
.faq-tab-icon svg { display:block; }

/* ===== BODY LAYOUT ===== */
.faq-body {
  display:grid; grid-template-columns:260px 1fr;
  max-width:1100px; margin:0 auto;
  padding:40px 80px 80px;
  gap:48px;
}

/* ===== SIDEBAR ===== */
.faq-sidebar { position:sticky; top:calc(var(--nav-total,210px) + 20px); align-self:start; }
.faq-sidebar-label {
  font-size:11px; font-weight:700; color:#9CA3AF;
  letter-spacing:1px; text-transform:uppercase;
  padding:0 4px; margin-bottom:10px;
}
.faq-sidebar-list { display:flex; flex-direction:column; gap:1px; margin-bottom:20px; }
.faq-sidebar-btn {
  display:flex; align-items:center; gap:10px;
  width:100%; padding:11px 12px; border:none;
  background:transparent; border-radius:8px;
  font-size:14px; font-weight:500; color:#374151;
  cursor:pointer; text-align:left; transition:all .15s;
  line-height:1.4;
}
.faq-sidebar-btn:hover { background:#F9FAFB; color:#111827; }
.faq-sidebar-btn.active { background:#EEF2FF; color:#2563EB; font-weight:700; }
.faq-sidebar-btn-icon {
  width:22px; height:22px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
}
.faq-sidebar-arrow { margin-left:auto; font-size:14px; color:#D1D5DB; }
.faq-sidebar-btn.active .faq-sidebar-arrow { color:#93C5FD; }

.faq-consult-box {
  border:1px solid #E5E7EB; border-radius:14px; padding:20px 16px;
}
.faq-consult-icon {
  width:40px; height:40px; border-radius:50%;
  background:#EEF2FF; display:flex; align-items:center; justify-content:center;
  margin-bottom:12px;
}
.faq-consult-title { font-size:14px; font-weight:700; color:#111827; margin-bottom:5px; }
.faq-consult-desc { font-size:12px; color:#6B7280; line-height:1.6; margin-bottom:14px; }
.faq-consult-btns { display:flex; flex-direction:column; gap:8px; }
.btn-kakao-s {
  display:flex; align-items:center; justify-content:center; gap:7px;
  height:38px; border-radius:8px; font-size:13px; font-weight:600;
  background:#fff; color:#111; border:1.5px solid #E5E7EB; cursor:pointer;
  transition:border-color .15s;
}
.btn-kakao-s:hover { border-color:#2563EB; }
.btn-consult-s {
  display:flex; align-items:center; justify-content:center; gap:7px;
  height:38px; border-radius:8px; font-size:13px; font-weight:700;
  background:#2563EB; color:#fff; border:none; cursor:pointer;
  transition:background .15s;
}
.btn-consult-s:hover { background:#1d4ed8; }

/* ===== FAQ CONTENT ===== */
.faq-content {}
.faq-content-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:4px;
}
.faq-content-title { font-size:22px; font-weight:800; color:#111827; }
.faq-expand-btn {
  font-size:13px; color:#2563EB; font-weight:600;
  background:none; border:none; cursor:pointer; white-space:nowrap;
}
.faq-content-sub { font-size:13px; color:#9CA3AF; margin-bottom:20px; }

.faq-list { display:flex; flex-direction:column; }
.faq-item { border-bottom:1px solid #F3F4F6; }
.faq-item:first-child { border-top:1px solid #F3F4F6; }
.faq-q-btn {
  display:flex; align-items:center; gap:16px;
  width:100%; padding:18px 6px; border:none; background:transparent;
  cursor:pointer; text-align:left; transition:background .15s;
}
.faq-q-btn:hover { background:#FAFAFA; }
.faq-q-num { font-size:13px; font-weight:800; color:#2563EB; width:22px; flex-shrink:0; }
.faq-q-text { flex:1; font-size:15px; font-weight:500; color:#111827; line-height:1.5; }
.faq-q-plus {
  width:26px; height:26px; border-radius:50%;
  background:#F3F4F6; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; font-size:18px; line-height:1; color:#6B7280; font-weight:300;
  transition:all .25s;
}
.faq-item.open .faq-q-plus { background:#EEF2FF; color:#2563EB; transform:rotate(45deg); }
.faq-item.open .faq-q-text { color:#3B6FA8; font-weight:600; }
.faq-answer { max-height:0; overflow:hidden; transition:max-height .4s cubic-bezier(0.4,0,0.2,1); }
.faq-item.open .faq-answer { max-height:800px; }
.faq-answer-inner { padding:8px 6px 24px 6px; }

/* 클립보드 스타일 */
.faq-clipboard {
  background: #1E3A5F;
  border-radius: 10px;
  padding: 0 12px 12px;
  box-shadow: 0 4px 16px rgba(30,58,95,0.25);
}
.faq-clipboard-clip {
  width: 60px; height: 22px;
  background: linear-gradient(180deg, #94A3B8 0%, #CBD5E1 40%, #94A3B8 100%);
  border-radius: 6px 6px 3px 3px;
  margin: 0 auto;
  position: relative; top: -8px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
.faq-clipboard-clip::before {
  content: '';
  position: absolute; top: 4px;
  left: 50%; transform: translateX(-50%);
  width: 28px; height: 10px;
  background: #E2E8F0; border-radius: 3px;
  box-shadow: inset 0 1px 3px rgba(0,0,0,0.15);
}
.faq-clipboard-paper {
  background: #fff; border-radius: 6px;
  padding: 14px 16px 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.faq-clipboard-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px; padding-bottom: 10px;
  border-bottom: 1.5px solid #EEF2FF;
}
.faq-clipboard-icon {
  width: 24px; height: 24px; border-radius: 6px;
  background: #EEF2FF; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.faq-clipboard-title { font-size: 12px; font-weight: 800; color: #3B6FA8; }
.faq-clipboard-body { font-size: 14px; color: #4B5563; line-height: 1.85; word-break: keep-all; }
.faq-answer-text { display:none; }

/* ===== BOTTOM CTA ===== */
.faq-bottom {
  background:#F8FAFF; border-top:1px solid #E5E7EB;
}
.faq-bottom-inner {
  max-width:1100px; margin:0 auto;
  padding:36px 80px;
  display:flex; align-items:center; justify-content:space-between; gap:20px;
}
.faq-bottom-left { display:flex; align-items:center; gap:16px; }
.faq-bottom-icon {
  width:52px; height:52px; border-radius:50%;
  background:#EEF2FF; display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.faq-bottom-title { font-size:17px; font-weight:800; color:#111827; margin-bottom:3px; }
.faq-bottom-desc { font-size:13px; color:#6B7280; }
.faq-bottom-btns { display:flex; gap:10px; }
.btn-bottom-ghost {
  height:46px; padding:0 26px; border-radius:50px;
  border:1.5px solid #E5E7EB; background:#fff;
  font-size:14px; font-weight:700; color:#111827; cursor:pointer; transition:all .15s;
}
.btn-bottom-ghost:hover { border-color:#2563EB; color:#2563EB; }
.btn-bottom-primary {
  height:46px; padding:0 26px; border-radius:50px;
  border:none; background:#2563EB;
  font-size:14px; font-weight:700; color:#fff; cursor:pointer; transition:background .15s;
}
.btn-bottom-primary:hover { background:#1d4ed8; }

/* ===== FADE ===== */
.fade-up { opacity:0; transform:translateY(14px); transition:opacity .4s ease, transform .4s ease; }
.fade-up.visible { opacity:1; transform:translateY(0); }

/* ===== MOBILE ===== */
@media (max-width:768px) {
  :root { --nav-total:146px; }
  .pc-only { display:none !important; }
  .nav-top {
    position:fixed; top:0; left:0; right:0; z-index:1000;
    height:110px; background:#fff; border-bottom:1px solid rgba(0,0,0,0.07);
    display:flex; align-items:center; justify-content:space-between; padding:0 20px;
  }
  .nav-logo img { height:66px; }
  .nav-vivid { position:absolute; left:50%; transform:translateX(-50%); text-decoration:none; }
  .nav-vivid img { height:100px; }
  .nav-btns { display:none; }
  .nav-hamburger { display:flex; flex-direction:column; gap:5px; background:none; border:none; cursor:pointer; padding:4px; }
  .nav-hamburger span { width:22px; height:2px; background:#111827; border-radius:2px; display:block; }
  .nav-sub { position:fixed; top:110px; left:0; right:0; z-index:999; height:36px; background:#fff; border-bottom:1px solid rgba(0,0,0,0.07); display:flex; align-items:center; justify-content:space-around; padding:0 8px; }
  .nav-sub a { font-size:11px; font-weight:600; color:#111827; text-decoration:none; padding:0 8px; white-space:nowrap; }
  .nav-sub-div { display:none; }
  .mobile-drawer { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.5); z-index:2000; }
  .mobile-drawer.open { display:block; }
  .drawer-inner { background:#fff; width:280px; height:100%; padding:28px 20px; display:flex; flex-direction:column; gap:12px; animation:slideIn .25s ease; }
  @keyframes slideIn { from{transform:translateX(-100%)} to{transform:translateX(0)} }
  .drawer-links a { display:block; font-size:15px; font-weight:600; color:#111827; text-decoration:none; padding:12px 4px; border-bottom:1px solid #f3f4f6; }
  .drawer-divider { height:1px; background:#F3F4F6; }
  .drawer-btn-kakao { display:flex; align-items:center; justify-content:center; gap:8px; background:#FEE500; color:#000; border:none; padding:14px; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; width:100%; }
  .drawer-btn-consult { display:flex; align-items:center; justify-content:center; gap:8px; background:#2563EB; color:#fff; border:none; padding:14px; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; width:100%; }
  .faq-hero-inner { padding:24px 20px 20px; flex-direction:column; gap:0; }
  .faq-hero-img { display:none; }
  .faq-hero-title { font-size:24px; }
  .faq-search-wrap { max-width:100%; }
  .faq-tabs-wrap { padding:0; overflow-x:auto; }
  .faq-tabs-outer { padding:0 16px; display:block; }
  .faq-tabs { justify-content:flex-start; width:max-content; }
  .faq-tab { min-width:80px; padding:14px 10px 12px; font-size:12px; flex:none; }
  .faq-tab-icon { width:38px; height:38px; border-radius:10px; margin:0 auto; }
  .faq-body { padding:20px 16px 100px; grid-template-columns:1fr; gap:0; }
  .faq-sidebar { display:none; }
  .faq-bottom-inner { flex-direction:column; padding:24px 20px; align-items:flex-start; }
  .faq-bottom-btns { width:100%; }
  .btn-bottom-ghost, .btn-bottom-primary { flex:1; }

  /* 모바일 하단 고정 카테고리 필터 */
  .mobile-cat-bar {
    display: flex;
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 900;
    background: #fff;
    border-top: 1px solid #E5E7EB;
    overflow-x: auto; scrollbar-width: none;
    padding: 8px 12px 12px;
    gap: 8px;
    box-shadow: 0 -4px 16px rgba(0,0,0,0.08);
  }
  .mobile-cat-bar::-webkit-scrollbar { display:none; }
  .mobile-cat-btn {
    display: flex; align-items: center; gap: 5px;
    flex-shrink: 0;
    height: 34px; padding: 0 12px;
    border-radius: 50px;
    border: 1.5px solid #E5E7EB;
    background: #fff;
    font-size: 12px; font-weight: 600; color: #6B7280;
    cursor: pointer; transition: all .15s;
    white-space: nowrap;
  }
  .mobile-cat-btn.active {
    background: #1E3A5F; color: #fff; border-color: #1E3A5F;
  }
}

footer { background:#111827; color:#9CA3AF; padding:28px; text-align:center; font-size:12px; line-height:2; }
.mobile-cat-bar { display:none; }
@media (max-width:768px) { .mobile-cat-bar { display:flex !important; } }

/* 플로팅 상담 버튼 */
.float-consult {
  position: fixed; right: calc(50% - 620px); bottom: 140px; z-index: 800;
  display: flex; flex-direction: column; align-items: flex-end; gap: 10px;
  opacity: 0; transform: translateY(20px);
  transition: opacity .3s ease, transform .3s ease;
  pointer-events: none;
}
.float-consult.visible { opacity: 1; transform: translateY(0); pointer-events: all; }
.float-btn {
  display: flex; align-items: center; gap: 8px;
  height: 48px; padding: 0 20px;
  border-radius: 50px; border: none; cursor: pointer;
  font-size: 14px; font-weight: 700;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  transition: transform .15s, box-shadow .15s;
  white-space: nowrap;
}
.float-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.2); }
.float-btn-kakao { background: #FEE500; color: #111; }
.float-btn-consult { background: #1E3A5F; color: #fff; }
.float-btn-main {
  height: 52px; padding: 0 20px;
  border-radius: 50px; background: #1E3A5F; color: #fff;
  display: flex; align-items: center; gap: 8px;
  box-shadow: 0 4px 20px rgba(30,58,95,0.45);
  font-size: 14px; font-weight: 700;
}
.float-sub { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
.float-sub.hidden { display: none; }

@media (max-width:768px) {
  .float-consult { right: 16px; bottom: 80px; }
  .float-btn { font-size: 13px; height: 42px; padding: 0 16px; }
  .float-btn-main { height: 44px; padding: 0 16px; font-size: 13px; }
}

let curCat = '요금제', allOpen = false;

function getFaqItems(cat) {
  return FAQ_DEFAULT[cat] || [];
}

function renderFAQ(cat, kw) {
  const list = document.getElementById('faqList');
  const title = document.getElementById('contentTitle');
  const count = document.getElementById('contentCount');
  let items = getFaqItems(cat);
  if (kw) {
    const allItems = Object.keys(FAQ_DEFAULT).flatMap(c => FAQ_DEFAULT[c] || []);
    items = allItems.filter(i => i.q.includes(kw) || i.a.includes(kw));
    title.textContent = '"' + kw + '" 검색 결과';
    count.textContent = '총 ' + items.length + '개의 검색 결과';
  } else {
    title.textContent = cat;
    count.textContent = '총 ' + items.length + '개의 자주 묻는 질문';
  }
  list.innerHTML = '';
  if (!items.length) {
    list.innerHTML = '<div style="padding:48px 0;text-align:center;color:#9CA3AF;font-size:14px;">검색 결과가 없어요.</div>';
    return;
  }
  items.forEach(function(item, i) {
    var el = document.createElement('div');
    el.className = 'faq-item fade-up';
    el.innerHTML =
      '<button class="faq-q-btn" onclick="this.parentElement.classList.toggle(\'open\')">' +
        '<span class="faq-q-num">' + String(i+1).padStart(2,'0') + '</span>' +
        '<span class="faq-q-text">' + item.q + '</span>' +
        '<span class="faq-q-plus">+</span>' +
      '</button>' +
      '<div class="faq-answer"><div class="faq-answer-inner">' +
        '<div class="faq-clipboard">' +
          '<div class="faq-clipboard-clip"></div>' +
          '<div class="faq-clipboard-paper">' +
            '<div class="faq-clipboard-header">' +
              '<div class="faq-clipboard-icon"><svg width="13" height="13" fill="none" stroke="#4C7DB8" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg></div>' +
              '<span class="faq-clipboard-title">궁금해요!</span>' +
            '</div>' +
            '<div class="faq-clipboard-body">' + item.a + '</div>' +
          '</div>' +
        '</div>' +
      '</div></div>';
    list.appendChild(el);
    setTimeout(function(e){ e.classList.add('visible'); }, i * 35, el);
  });
}

function expandAll() {
  allOpen = !allOpen;
  document.querySelectorAll('.faq-item').forEach(function(el){ allOpen ? el.classList.add('open') : el.classList.remove('open'); });
  document.querySelector('.faq-expand-btn').textContent = allOpen ? '전체 닫기 −' : '전체 열기 +';
}
window.expandAll = expandAll;

function switchCat(cat, tabEl, sideEl) {
  curCat = cat;
  document.querySelectorAll('.faq-tab').forEach(function(t){ t.classList.toggle('active', t.textContent.trim() === cat); });
  document.querySelectorAll('.faq-sidebar-btn').forEach(function(b){ b.classList.toggle('active', b.textContent.trim().replace(/\s+/g,' ').indexOf(cat) === 0); });
  allOpen = false;
  document.querySelector('.faq-expand-btn').textContent = '전체 열기 +';
  renderFAQ(cat);
}
window.switchCat = switchCat;

var st;
function handleSearch(v) {
  clearTimeout(st);
  st = setTimeout(function(){ v.trim() ? renderFAQ(curCat, v.trim()) : renderFAQ(curCat); }, 280);
}
window.handleSearch = handleSearch;

function toggleDrawer(){ document.getElementById('mobileDrawer').classList.toggle('open'); }
function closeDrawer(e){ if(e.target===e.currentTarget) document.getElementById('mobileDrawer').classList.remove('open'); }
window.toggleDrawer = toggleDrawer;
window.closeDrawer = closeDrawer;

// 플로팅 버튼
var floatEl = document.getElementById('floatConsult');
var floatOpen = false;
window.addEventListener('scroll', function(){
  if(window.scrollY > 150) floatEl.classList.add('visible');
  else floatEl.classList.remove('visible');
});
window.toggleFloat = function() {
  floatOpen = !floatOpen;
  var sub = document.getElementById('floatSub');
  var btn = document.getElementById('floatMainBtn');
  sub.classList.toggle('hidden', !floatOpen);
  btn.style.background = floatOpen ? '#374151' : '#1E3A5F';
  btn.innerHTML = floatOpen
    ? '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> 닫기'
    : '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> 상담하기';
};
window.mobileSwitchCat = function(cat, btn) {
  document.querySelectorAll('.mobile-cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  switchCat(cat);
  window.scrollTo({top: 0, behavior: 'smooth'});
};

var nav = document.querySelector('.nav-top');
window.addEventListener('scroll', function(){
  var s = window.scrollY > 40;
  if(nav){ nav.style.backdropFilter=s?'blur(12px)':''; nav.style.boxShadow=s?'0 2px 20px rgba(0,0,0,0.08)':''; nav.style.background=s?'rgba(255,255,255,0.85)':''; }
});

// 초기 렌더
renderFAQ('요금제');
</script>
